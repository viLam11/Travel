# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — Host-level config for Travello
# File: /etc/nginx/sites-available/travello
#
# This config sits on the Ubuntu VM host (NOT inside Docker).
# It proxies public HTTP/HTTPS traffic into the Docker container on port 3000.
#
# Usage:
#   1. Replace YOUR_DOMAIN_OR_IP with your actual domain/IP
#   2. sudo cp this file to /etc/nginx/sites-available/travello
#   3. sudo ln -sf /etc/nginx/sites-available/travello /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. (Optional SSL) sudo certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name travello.duckdns.org;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy to Frontend Docker container ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (needed for Vite HMR in dev; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Real IP forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Proxy API to Backend (Fix Mixed Content) ────────────────────────────
    location /api/ {
        # proxy_pass ends with / to strip /api before sending to backend
        proxy_pass         http://52.193.141.173:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (bypass proxy) ──────────────────────────────────────────
    location /nginx-health {
        return 200 "Nginx OK\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Max upload size ──────────────────────────────────────────────────────
    client_max_body_size 20M;
}

# ─────────────────────────────────────────────────────────────────────────────
# After running: sudo certbot --nginx -d yourdomain.com
# Certbot will automatically add the HTTPS block below.
# ─────────────────────────────────────────────────────────────────────────────
